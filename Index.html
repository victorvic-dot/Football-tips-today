<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictions | Win Big</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .badge-win { background-color: #28a745; }
        .badge-loss { background-color: #dc3545; }
        .btn-vip { background-color: #ffc107; color: #000; font-weight: bold; border-radius: 30px; padding: 12px 30px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>AVIATOR PREDICTIONS</h1>
    <p>Expert Football Analysis & VIP Tips</p>
</div>

<div class="container">
    <div class="card p-4">
        <h3 class="mb-3">Today's Free Tips</h3>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Match</th><th>Tip</th><th>Odds</th></tr>
                </thead>
                <tbody id="free-tips-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card p-4 text-center border-warning" style="border: 2px solid;">
        <h3>🔒 VIP Section</h3>
        <p>Get our most accurate high-odds tickets.</p>
        <button onclick="makePayment()" class="btn btn-vip">GET VIP ACCESS (20,000 UGX)</button>
    </div>

    <div class="card p-4">
        <h3 class="mb-3">Recent Results (History)</h3>
        <div class="table-responsive">
            <table class="table table-sm">
                <thead>
                    <tr><th>Date</th><th>Match</th><th>Result</th></tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Fetch Data from data.json
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            // Load Free Tips
            const freeBody = document.getElementById('free-tips-body');
            data.free_tips.forEach(item => {
                freeBody.innerHTML += `<tr><td>${item.match}</td><td>${item.tip}</td><td><span class="badge bg-primary">${item.odds}</span></td></tr>`;
            });

            // Load History
            const historyBody = document.getElementById('history-body');
            data.history.forEach(item => {
                const statusClass = item.status === 'WIN' ? 'badge-win' : 'badge-loss';
                historyBody.innerHTML += `<tr><td>${item.date}</td><td>${item.match}</td><td><span class="badge ${statusClass}">${item.status}</span></td></tr>`;
            });
        });

    // 2. Flutterwave Payment
    function makePayment() {
        FlutterwaveCheckout({
            public_key: "FLWPUBK_TEST-XXXXX-X", // REPLACE WITH YOUR KEY
            tx_ref: "AVI-" + Date.now(),
            amount: 20000,
            currency: "UGX",
            payment_options: "mobilemoneyuganda",
            callback: function (data) {
                if (data.status === "successful") {
                    window.location.href = "vip-tips-private.html";
                }
            },
            customizations: { title: "Aviator VIP", description: "Full Day VIP Access" }
        });
    }
</script>

</body>
</html>
